<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Convite Valentina</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.convite {
    background: white;
    padding: 30px;
    border-radius: 15px;
    text-align: center;
    max-width: 400px;
}

h1 {
    color: #ff4b7d;
}

button {
    margin-top: 20px;
    padding: 12px 20px;
    border: none;
    border-radius: 8px;
    background: #25D366;
    color: white;
    font-size: 1em;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="convite">
    <h1>🎉 Convite Especial 🎉</h1>
    <h2>Valentina Camillo</h2>

    <p>
        03/05/26 <br>
        ⏰ Quando o sol raiar. <br>
        📍 Av. Presidente Joao Goulart, n:01/Churrasqueira 03 - Inova Sao Francisco. Osasco-SP.
    </p>

    <button onclick="confirmar()">Confirmar Presença 📲</button>
</div>

<script>
function confirmar() {
    const numero ="+5511969911236"; // COLOQUE SEU NÚMERO AQUI (com DDD)
    const mensagem = "Olá! Confirmo minha presença no aniversário da Valentina Camillo 🎉";
    
    const url = "https://wa.me/" + numero + "?text=" + encodeURIComponent(mensagem);
    
    window.open(url, "_blank");
}
</script>

</body>
</html>
